services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dibujando
      POSTGRES_PASSWORD: dibujando
      POSTGRES_DB: dibujando
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dibujando -d dibujando']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
